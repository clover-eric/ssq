<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric的致富工具之双色球</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Eric的致富工具之双色球</h1>
            <div class="current-date" id="currentDate"></div>
        </header>

        <main>
            <section class="number-generator">
                <div class="generator-container">
                    <div class="generator-header">
                        <h2>双色球号码生成器</h2>
                        <div class="generator-mode">
                            <button class="mode-btn random-mode active" data-mode="random">
                                <span class="btn-icon">🎲</span>
                                <span class="btn-text">随机生成</span>
                            </button>
                            <button class="mode-btn smart-mode" data-mode="smart">
                                <span class="btn-icon">🤖</span>
                                <span class="btn-text">智能推荐</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="mode-descriptions">
                        <div class="mode-description random-mode-desc active">
                            <h3>🎲 随机生成模式</h3>
                            <p>完全随机生成号码，红球从01-33中随机选择6个不重复号码，蓝球从01-16中随机选择1个号码。每注号码都是独立随机的，适合想要完全碰运气的朋友。</p>
                        </div>
                        <div class="mode-description smart-mode-desc">
                            <h3>🤖 智能推荐模式</h3>
                            <p>基于历史开奖数据分析，结合号码出现频率、遗漏值等多个维度，智能推荐可能性更高的号码组合。适合想要参考数据分析结果的朋友。</p>
                        </div>
                    </div>

                    <div class="number-stage">
                        <div class="number-area red-area">
                            <div class="area-title">红球区</div>
                            <div class="ball-container">
                                <div class="ball-wrapper">
                                    <div class="lottery-ball red">
                                        <span class="ball-number"></span>
                                        <div class="ball-shine"></div>
                                    </div>
                                </div>
                                <div class="ball-wrapper">
                                    <div class="lottery-ball red">
                                        <span class="ball-number"></span>
                                        <div class="ball-shine"></div>
                                    </div>
                                </div>
                                <div class="ball-wrapper">
                                    <div class="lottery-ball red">
                                        <span class="ball-number"></span>
                                        <div class="ball-shine"></div>
                                    </div>
                                </div>
                                <div class="ball-wrapper">
                                    <div class="lottery-ball red">
                                        <span class="ball-number"></span>
                                        <div class="ball-shine"></div>
                                    </div>
                                </div>
                                <div class="ball-wrapper">
                                    <div class="lottery-ball red">
                                        <span class="ball-number"></span>
                                        <div class="ball-shine"></div>
                                    </div>
                                </div>
                                <div class="ball-wrapper">
                                    <div class="lottery-ball red">
                                        <span class="ball-number"></span>
                                        <div class="ball-shine"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="number-area blue-area">
                            <div class="area-title">蓝球区</div>
                            <div class="ball-container">
                                <div class="ball-wrapper">
                                    <div class="lottery-ball blue">
                                        <span class="ball-number"></span>
                                        <div class="ball-shine"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="generator-actions">
                        <div class="batch-options">
                            <label for="batchCount">批量生成:</label>
                            <select id="batchCount">
                                <option value="1">1注</option>
                                <option value="3">3注</option>
                                <option value="5">5注</option>
                                <option value="10">10注</option>
                            </select>
                        </div>
                        <button id="generateBtn" class="action-btn generate-btn">
                            <div class="btn-content">
                                <span class="btn-icon">✨</span>
                                <span class="btn-text">开始生成</span>
                            </div>
                            <div class="generate-ripple"></div>
                        </button>
                    </div>

                    <div class="generated-history">
                        <div class="history-header">
                            <h3>生成记录</h3>
                            <button id="clearHistory" class="clear-btn">清空记录</button>
                        </div>
                        <div id="generatedHistory" class="history-list">
                            <div class="empty-history">暂无生成记录</div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="latest-draw">
                <h2 id="resultTitle">最新开奖</h2>
                <div class="draw-result latest" id="latestDraw">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <section class="lottery-history">
                <div class="history-header">
                    <h2>历史开奖</h2>
                    <div class="search-box">
                        <input type="text" id="drawNumber" placeholder="请输入期号，如：2024128" />
                        <button id="searchBtn" class="search-btn">查询</button>
                    </div>
                </div>
                
                <div class="history-container">
                    <div class="history-list" id="historyDraws">
                        <div class="history-item">
                            <div class="draw-info">
                                <span class="draw-no">期号：<span id="drawNo">2024128</span></span>
                                <span class="draw-date">开奖日期：<span id="drawDate">2024-11-07</span></span>
                            </div>
                            <div class="draw-numbers">
                                <div class="red-balls">
                                    <span class="history-ball red-ball">13</span>
                                    <span class="history-ball red-ball">01</span>
                                    <span class="history-ball red-ball">18</span>
                                    <span class="history-ball red-ball">26</span>
                                    <span class="history-ball red-ball">08</span>
                                    <span class="history-ball red-ball">20</span>
                                </div>
                                <div class="blue-balls">
                                    <span class="history-ball blue-ball">16</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <div id="notification" class="notification"></div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
