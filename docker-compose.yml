version: '3.8'

services:
  ssq:
    build: .
    container_name: ssq-app
    restart: always
    ports:
      - "51168:51168"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PORT=51168
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:51168"]
      interval: 30s
      timeout: 10s
      retries: 3